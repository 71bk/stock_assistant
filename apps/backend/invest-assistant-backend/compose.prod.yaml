services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invest_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-invest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    networks:
      - app-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/71bk/stock_assistant/backend:latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-invest_assistant}
      DB_USER: ${POSTGRES_USER:-invest}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_AUTH_JWT_SECRET: ${APP_AUTH_JWT_SECRET:?APP_AUTH_JWT_SECRET is required}
      APP_AUTH_ISSUER: ${APP_AUTH_ISSUER:-invest-assistant}
      APP_AUTH_LOGIN_REDIRECT: ${APP_AUTH_LOGIN_REDIRECT:-https://app.stock.71bk.dev}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-https://app.stock.71bk.dev}
      APP_SECURITY_TRUSTED_PROXY_IP_LIST: ${NGINX_INTERNAL_IP:-172.30.0.10}
      APP_RATE_LIMIT_PROVIDER: ${APP_RATE_LIMIT_PROVIDER:-redis}
      APP_RATE_LIMIT_REDIS_FAIL_OPEN: ${APP_RATE_LIMIT_REDIS_FAIL_OPEN:-false}
      APP_OCR_AI_WORKER_BASE_URL: http://ai-worker:8001
      APP_RAG_AI_WORKER_BASE_URL: http://ai-worker:8001
      APP_FILES_LOCAL_PATH: /app/data/uploads
      APP_FILES_PROVIDER: ${APP_FILES_PROVIDER:-local}
      APP_RAG_MAX_FILE_SIZE_MB: ${APP_RAG_MAX_FILE_SIZE_MB:-50}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-50MB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-50MB}
      APP_AI_GROQ_API_KEY: ${APP_AI_GROQ_API_KEY:?APP_AI_GROQ_API_KEY is required}
      APP_AI_GROQ_BASE_URL: ${APP_AI_GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      APP_AI_GROQ_MODEL: ${APP_AI_GROQ_MODEL:-openai/gpt-oss-120b}
      SENTRY_DSN: ${SENTRY_DSN:-https://21aba3540917b025b25ab02fbf54c2bc@o4510673121968128.ingest.us.sentry.io/4510673150083072}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:-}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:-}
      APP_ADMIN_API_KEY: ${APP_ADMIN_API_KEY:-}
    volumes:
      - backend_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  ai-worker:
    image: ${AI_WORKER_IMAGE:-ghcr.io/71bk/stock_assistant/ai-worker:latest}
    restart: unless-stopped
    environment:
      SERVICE_NAME: ai-worker
      ENVIRONMENT: prod
      LOG_LEVEL: ${AI_WORKER_LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:-invest}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-invest_assistant}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${AI_WORKER_CORS_ORIGINS:-https://app.stock.71bk.dev,https://api.stock.71bk.dev}
      LLM_PROVIDER: ${AI_WORKER_LLM_PROVIDER:-gemini}
      EMBEDDING_PROVIDER: ${AI_WORKER_EMBEDDING_PROVIDER:-gemini}
      OCR_PROVIDER: ${AI_WORKER_OCR_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GEMINI_VISION_MODEL: ${GEMINI_VISION_MODEL:-gemini-2.5-flash}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${AI_WORKER_EMBEDDING_DIMENSION:-1536}
      EMBEDDING_EXPECTED_DIMENSION: ${AI_WORKER_EMBEDDING_EXPECTED_DIMENSION:-1536}
      RAG_DOWNLOAD_MAX_BYTES: ${RAG_DOWNLOAD_MAX_BYTES:-52428800}
      PDF_MAX_PAGES: ${PDF_MAX_PAGES:-50}
      PDF_MAX_TOTAL_PIXELS: ${PDF_MAX_TOTAL_PIXELS:-200000000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ['CMD', 'python', '-c', "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'
    volumes:
      - ../../../infra/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      app-net:
        ipv4_address: ${NGINX_INTERNAL_IP:-172.30.0.10}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/nginx-health | grep -q ok']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  app-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${APP_DOCKER_SUBNET:-172.30.0.0/24}
