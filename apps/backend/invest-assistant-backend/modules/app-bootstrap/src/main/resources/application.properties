server.servlet.context-path=/api

# Application Name
spring.application.name=invest-assistant-backend

# Disable Docker Compose auto-start (run containers manually)
spring.docker.compose.enabled=false

# Active Profile (dev loads testdata, prod does not)
spring.profiles.active=dev
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:invest_assistant}
spring.datasource.username=${DB_USER:invest}
spring.datasource.password=${DB_PASSWORD:invest}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.enabled=true
# Flyway locations set in profile-specific files (application-dev.properties includes testdata)

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:10s}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:dev-secret-change-me-please-use-32bytes}
app.auth.issuer=${APP_AUTH_ISSUER:invest-assistant}
app.auth.access-token-ttl=${APP_AUTH_ACCESS_TTL:15m}
app.auth.refresh-token-ttl=${APP_AUTH_REFRESH_TTL:7d}
app.auth.cookie-secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}
app.auth.access-cookie-path=${APP_AUTH_ACCESS_COOKIE_PATH:/}
app.auth.refresh-cookie-path=${APP_AUTH_REFRESH_COOKIE_PATH:/api/auth/refresh}
app.auth.login-success-redirect=${APP_AUTH_LOGIN_REDIRECT:http://localhost:5173}

app.files.local-path=${APP_FILES_LOCAL_PATH:D:/MyDomain/stock/stock_assistant/apps/backend/invest-assistant-backend/data/uploads}
app.files.provider=${APP_FILES_PROVIDER:local}
app.files.bucket=${APP_FILES_BUCKET:}
app.files.region=${APP_FILES_REGION:us-east-1}
app.files.endpoint=${APP_FILES_ENDPOINT:}
app.files.access-key=${APP_FILES_ACCESS_KEY:}
app.files.secret-key=${APP_FILES_SECRET_KEY:}
app.files.presign-expiry-seconds=${APP_FILES_PRESIGN_EXPIRY_SECONDS:900}
app.ocr.ai-worker.base-url=${APP_OCR_AI_WORKER_BASE_URL:http://localhost:8001}
app.ocr.queue.stream-key=${APP_OCR_QUEUE_STREAM_KEY:ocr:queue}
app.ocr.queue.group=${APP_OCR_QUEUE_GROUP:ocr-workers}
app.ocr.queue.consumer=${APP_OCR_QUEUE_CONSUMER:ocr-worker}
app.ocr.queue.batch-size=${APP_OCR_QUEUE_BATCH_SIZE:10}
app.ocr.queue.block=${APP_OCR_QUEUE_BLOCK:2s}
app.ocr.queue.poll-interval-ms=${APP_OCR_QUEUE_POLL_INTERVAL_MS:1000}
app.ocr.queue.max-running-minutes=${APP_OCR_QUEUE_MAX_RUNNING_MINUTES:30}
app.ocr.dedupe-ttl-seconds=${APP_OCR_DEDUPE_TTL_SECONDS:604800}

app.ai.groq.base-url=${APP_AI_GROQ_BASE_URL:https://api.groq.com/openai/v1}
app.ai.groq.api-key=${APP_AI_GROQ_API_KEY:}
app.ai.groq.model=${APP_AI_GROQ_MODEL:openai/gpt-oss-120b}
app.ai.groq.temperature=${APP_AI_GROQ_TEMPERATURE:0.2}
app.ai.groq.max-completion-tokens=${APP_AI_GROQ_MAX_TOKENS:512}
app.ai.groq.top-p=${APP_AI_GROQ_TOP_P:1.0}

# Google OAuth2 (uncomment and set env vars to enable Google login)
# spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:}
# spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.google.scope=openid,profile,email

# CORS
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173}

app.admin.api-key=${APP_ADMIN_API_KEY:}

sentry.dsn=https://21aba3540917b025b25ab02fbf54c2bc@o4510673121968128.ingest.us.sentry.io/4510673150083072
# Add data like request headers and IP for users,
# see https://docs.sentry.io/platforms/java/guides/spring-boot/data-management/data-collected/ for more info
sentry.send-default-pii=true
# Set environment based on active profile or environment variable
sentry.environment=${SPRING_PROFILES_ACTIVE:dev}
# Enable sending logs to Sentry
sentry.logs.enabled=true
# Set traces-sample-rate to 1.0 to capture 100% of transactions for tracing.
# We recommend adjusting this value in production.
sentry.traces-sample-rate=1.0

# Stock Market API Configuration
stock.alpaca.key-id=${ALPACA_KEY_ID:}
stock.alpaca.secret-key=${ALPACA_SECRET_KEY:}
stock.alpaca.base-url=https://data.alpaca.markets
stock.fugle.api-key=${FUGLE_API_KEY:}
stock.fugle.base-url=https://api.fugle.tw/marketdata/v1.0/stock/
stock.cache.quote-ttl=300000
stock.cache.candles-ttl=3600000
