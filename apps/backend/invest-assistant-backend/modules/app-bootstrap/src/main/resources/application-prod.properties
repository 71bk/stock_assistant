# Production Environment Configuration

# Flyway - Migration only, no test data
spring.flyway.locations=classpath:db/migration

# Production security defaults
app.security.csrf.enabled=true
app.auth.cookie-secure=true
app.auth.cookie-same-site=None
app.security.trusted-proxy.enabled=true
app.security.trusted-proxy.ip-list=${APP_SECURITY_TRUSTED_PROXY_IP_LIST:}

# Production upload limits (env-overridable; default aligned with app.rag.max-file-size-mb=50)
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

# Do not expose API docs / Swagger UI in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Sentry
sentry.environment=prod
sentry.traces-sample-rate=0.1
